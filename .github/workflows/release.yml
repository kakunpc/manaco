name: Release

on:
  push:
    tags:
      - '*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: vars
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Update package.json version
        env:
          VERSION: ${{ steps.vars.outputs.version }}
        run: |
          node -e "const fs=require('fs'); const path='package.json'; const data=JSON.parse(fs.readFileSync(path,'utf8')); data.version=process.env.VERSION; fs.writeFileSync(path, JSON.stringify(data, null, 2)+'\n');"

      - name: Create VCC ZIP
        env:
          VERSION: ${{ steps.vars.outputs.version }}
        run: |
          zip -r com.kakunvr.manaco-${VERSION}.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x "*.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: com.kakunvr.manaco-${{ steps.vars.outputs.version }}.zip
          generate_release_notes: true

      - name: Update latest.json on main
        env:
          VERSION: ${{ steps.vars.outputs.version }}
        run: |
          git restore package.json
          git fetch origin versions || true
          if git show-ref --verify --quiet refs/remotes/origin/versions; then
            git checkout -B versions origin/versions
          else
            git checkout --orphan versions
            git rm -rf . || true
          fi
          cat > latest.json <<EOF
          {
            "version": "${VERSION}",
            "url": "https://github.com/${GITHUB_REPOSITORY}/releases/tag/${VERSION}"
          }
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add latest.json
          git diff --cached --quiet || git commit -m "Update latest.json for ${VERSION}"
          git push origin versions
